<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nREDCube™ — Access Required</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #f5f0e8;
            background-image:
                linear-gradient(rgba(180,160,120,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(180,160,120,0.08) 1px, transparent 1px);
            background-size: 32px 32px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'EB Garamond', Georgia, serif;
            color: #2c2417;
        }

        .gate {
            background: rgba(245, 240, 232, 0.92);
            border: 1px solid rgba(180,160,120,0.4);
            padding: 3rem 3.5rem;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 32px rgba(44,36,23,0.08);
        }

        .brand {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem;
            font-weight: 900;
            color: #c0392b;
            letter-spacing: 0.02em;
            margin-bottom: 0.2rem;
        }

        .brand sup {
            font-size: 0.55em;
            vertical-align: super;
        }

        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #2c2417;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #7a6a50;
            font-style: italic;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(180,160,120,0.3);
            padding-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #7a6a50;
            margin-bottom: 0.6rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 0.7rem 1rem;
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 1rem;
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(180,160,120,0.5);
            color: #2c2417;
            text-align: center;
            letter-spacing: 0.15em;
            outline: none;
            margin-bottom: 1rem;
        }

        input[type="password"]:focus {
            border-color: #c0392b;
            background: rgba(255,255,255,0.95);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #2c2417;
            color: #f5f0e8;
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 0.95rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #c0392b;
        }

        .error {
            color: #c0392b;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            font-style: italic;
            min-height: 1.2em;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #b0a080;
            border-top: 1px solid rgba(180,160,120,0.3);
            padding-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="gate">
        <p class="brand">nREDCube<sup>™</sup></p>
        <h1>PRINCIPIA</h1>
        <p class="subtitle">Access restricted — authorised parties only</p>

        <label for="pw">Access code</label>
        <input type="password" id="pw" autocomplete="off" autofocus placeholder="··········">
        <button onclick="checkPassword()">Enter</button>
        <p class="error" id="error-msg"></p>

        <p class="footer-note">© <script>document.write(new Date().getFullYear())</script> BoNster Pty. Ltd. ABN 80 612 233 306. All rights reserved.</p>
    </div>

    <script>
        function checkPassword() {
            var input = document.getElementById('pw').value;
            if (input === 'Domasa477') {
                sessionStorage.setItem('nrc_access', '1');
                window.location.href = 'principia.html';
            } else {
                document.getElementById('error-msg').textContent = 'Incorrect access code.';
                document.getElementById('pw').value = '';
                document.getElementById('pw').focus();
            }
        }

        document.getElementById('pw').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        // If already authenticated this session, go straight through
        if (sessionStorage.getItem('nrc_access') === '1') {
            window.location.href = 'principia.html';
        }
    </script>

</body>
</html>
